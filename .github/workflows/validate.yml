name: Validate marketplace

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Install pinned tooling
        run: npm ci
      - name: Validate repository metadata and native plugin manifests
        run: npm run validate
      - name: Validate Claude marketplace schema
        run: npx --no-install @anthropic-ai/claude-code plugin validate .
      - name: Rebuild native Codex plugins and verify they are committed
        run: |
          npm run plugins:sync
          git diff --exit-code -- .agents plugins
      - name: Build release archives
        run: npm run build
