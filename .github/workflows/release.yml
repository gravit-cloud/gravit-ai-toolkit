name: Publish release archives

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pinned tooling
        run: npm ci
      - name: Validate release metadata
        run: |
          npm run validate
          test "v$(node -p 'require("./package.json").version')" = "$GITHUB_REF_NAME"
      - name: Build versioned archives
        run: npm run build
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*-v*.zip --generate-notes
