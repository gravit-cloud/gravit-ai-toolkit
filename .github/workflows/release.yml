name: Publish release archives

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Install pinned tooling
        run: npm ci
      - name: Validate release metadata
        run: |
          npm run validate
          test "v$(node -p 'require("./package.json").version')" = "$GITHUB_REF_NAME"
      - name: Build versioned archives
        run: npm run build
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*-v*.zip --generate-notes
