name: Publish release archives

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
      - name: Install pinned tooling
        run: npm ci
      - name: Validate release metadata
        run: |
          npm run validate
          test "v$(node -p 'require("./package.json").version')" = "$GITHUB_REF_NAME"
      - name: Build versioned archives
        run: npm run build
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*-v*.zip --generate-notes
