name: Publish release archives

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - name: Install pinned tooling
        run: npm ci
      - name: Validate release metadata
        run: |
          npm run validate
          test "v$(node -p 'require("./package.json").version')" = "$GITHUB_REF_NAME"
      - name: Build versioned archives
        run: npm run build
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*-v*.zip --generate-notes
